<!DOCTYPE html>
<html>
<body>

<h2>AI Bot</h2>

<input id="soru" placeholder="Bir şey yaz..." style="width:300px;">
<button onclick="sor()">Gönder</button>

<pre id="cevap">Burada cevap çıkacak</pre>

<script>
async function sor() {
  const soru = document.getElementById("soru").value;

  document.getElementById("cevap").innerText = "Bekle...";

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ mesaj: soru })
  });

  const data = await res.json();

  document.getElementById("cevap").innerText =
    data.choices[0].message.content;
}
</script>

</body>
</html>
