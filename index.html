<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orhan AI</title>

  <style>
    body{
      margin:0;
      background:#0f172a;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      text-align:center;
      background:#111827;
      padding:40px;
      border-radius:20px;
      width:90%;
      max-width:500px;
      box-shadow:0 0 30px rgba(0,0,0,0.4);
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      opacity:.8;
      margin-bottom:30px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      margin-bottom:15px;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#3b82f6;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#2563eb;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>ORHAN AI</h1>
  <p>Dijital İkiz Sistemi</p>

  <input type="text" placeholder="Mesaj yaz...">
  <button>Gönder</button>
</div>

</body>
</html>
