<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Bot</title>
</head>
<body>
  <h1>AI Bot</h1>

  <input id="messageInput" type="text" placeholder="Bir şey yaz..." />
  <button onclick="sendMessage()">Gönder</button>

  <pre id="answerBox">Burada cevap çıkacak</pre>

  <script>
    async function sendMessage() {
      const input = document.getElementById("messageInput");
      const answerBox = document.getElementById("answerBox");
      const message = input.value.trim();

      if (!message) {
        answerBox.innerText = "Mesaj yaz.";
        return;
      }

      answerBox.innerText = "Bekle...";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const text = await response.text();

        answerBox.innerText =
          "HTTP STATUS: " + response.status + "\n\n" + text;

      } catch (error) {
        answerBox.innerText = "FRONTEND HATASI:\n" + error.message;
      }
    }
  </script>
</body>
</html>
