<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ORHAN CORE AI</title>

<style>
body{
background:#050505;
color:white;
font-family:Arial;
padding:20px;
}

h1{
color:#00ff99;
text-align:center;
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:20px;
}

button{
width:100%;
padding:15px;
font-size:20px;
background:#00ff99;
color:black;
border:none;
border-radius:10px;
margin-top:15px;
font-weight:bold;
}

#cevap{
margin-top:25px;
background:#111;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
line-height:1.5;
}
</style>
</head>

<body>

<h1>ORHAN CORE AI</h1>

<input id="mesaj" placeholder="Mesaj yaz..." />

<button onclick="gonder()">
YAPAY ZEKA İLE KONUŞ
</button>

<div id="cevap">
Hazır...
</div>

<script>

async function gonder(){

const mesaj =
document.getElementById("mesaj").value;

document.getElementById("cevap").innerText =
"Bekle...";

try{

const response = await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:mesaj
})

});

const data = await response.json();

document.getElementById("cevap").innerText =
data.reply || "Cevap yok.";

}catch(error){

document.getElementById("cevap").innerText =
"HATA: " + error.message;

}

}

</script>

</body>
</html>
