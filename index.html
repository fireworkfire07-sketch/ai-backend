<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orhan AI</title>

  <style>
    body{
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      padding:20px;
    }

    h1{
      font-size:40px;
    }

    input{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      font-size:18px;
      margin-top:20px;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#00ff88;
      color:black;
      font-size:18px;
      margin-top:10px;
      font-weight:bold;
    }

    #result{
      margin-top:20px;
      white-space:pre-wrap;
      line-height:1.6;
      font-size:18px;
    }
  </style>
</head>

<body>

  <h1>ORHAN AI ⚡</h1>

  <input
    type="text"
    id="prompt"
    placeholder="Ne istiyorsun yaz..."
  />

  <button onclick="sendPrompt()">
    Gönder
  </button>

  <div id="result">
    Cevap burada çıkacak...
  </div>

  <script>
    async function sendPrompt() {

      const prompt =
        document.getElementById("prompt").value;

      const result =
        document.getElementById("result");

      result.innerText = "Düşünüyor...";

      try {

        const response = await fetch(
          "https://ai-backend-one-theta.vercel.app/api/brain",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              prompt: prompt
            })
          }
        );

        const data = await response.json();

        result.innerText =
          data.choices?.[0]?.message?.content ||
          data.message?.content ||
          JSON.stringify(data, null, 2);

      } catch (error) {

        result.innerText =
          "Hata oluştu: " + error.message;
      }
    }
  </script>

</body>
</html>
