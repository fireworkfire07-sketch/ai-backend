<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORHAN CORE AI</title>
<style>
body{margin:0;background:#050505;color:white;font-family:Arial,sans-serif}
.container{max-width:560px;margin:auto;padding:22px}
h1{text-align:center;color:#00ff99;font-size:38px;margin-bottom:8px}
.subtitle{text-align:center;color:#aaa;font-size:20px;margin-bottom:18px}
textarea{width:100%;height:90px;border-radius:14px;padding:12px;font-size:16px;box-sizing:border-box;margin-bottom:10px}
button{width:100%;padding:18px;margin:9px 0;border:0;border-radius:18px;font-size:18px;font-weight:bold}
.green{background:#00ff99;color:#000}
.dark{background:#171717;color:#fff;border:1px solid #333}
.row{display:flex;gap:10px}
.row button{flex:1}
.box{margin-top:16px;padding:18px;background:#111;border:1px solid #333;border-radius:18px;white-space:pre-line;line-height:1.5}
</style>
</head>
<body>

<div class="container">
<h1>ORHAN CORE AI</h1>
<div class="subtitle">Yaz / Konuş / Görev Üret</div>

<textarea id="userInput" placeholder="ORHAN CORE AI’ye yaz..."></textarea>

<div class="row">
<button class="green" onclick="mesajGonder()">Gönder</button>
<button class="dark" onclick="konus()">🎙️ Konuş</button>
</div>

<div id="output" class="box">Sistem hazır. Mesaj yaz veya konuş.</div>

<button class="green" onclick="show('ana')">🧠 Ana Beyin Görevi</button>
<button class="green" onclick="show('denetle')">🔍 Tüm Dalları Denetle</button>
<button class="green" onclick="show('para')">💰 En Hızlı Para Görevi</button>
<button class="dark" onclick="show('aitube')">🎬 AiTube Video Dalı</button>
<button class="dark" onclick="show('foto')">📸 Foto Edit Dalı</button>
<button class="dark" onclick="show('satis')">💬 Satış Botu Dalı</button>
<button class="dark" onclick="show('ikiz')">🤖 Dijital İkiz Dalı</button>
<button class="dark" onclick="show('proje')">🧩 Proje Üreten Bot Dalı</button>
</div>

<script>
async function aiGonder(mesaj){
  const output=document.getElementById("output");
  output.innerText="ORHAN CORE AI düşünüyor...";

  try{
    const response=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:mesaj})
    });

    const data=await response.json();
    output.innerText=data.reply || "Cevap alınamadı.";
  }catch(error){
    output.innerText="Sistem hatası: "+error.message;
  }
}

function mesajGonder(){
  const mesaj=document.getElementById("userInput").value;
  if(!mesaj.trim()){
    document.getElementById("output").innerText="Önce mesaj yaz.";
    return;
  }
  aiGonder(mesaj);
}

function show(type){
  const komutlar={
    ana:"Bugünün ana beyin görevini oluştur.",
    denetle:"Tüm dalları denetle ve kısa rapor ver.",
    para:"Bugün en hızlı para kazandıracak görevi üret.",
    aitube:"AiTube için kısa video fikri üret.",
    foto:"Foto edit işi için satış görevi üret.",
    satis:"Satış DM mesajı oluştur.",
    ikiz:"Orhan adına düşünüp en mantıklı görevi seç.",
    proje:"Bugün para getirecek yeni proje üret."
  };
  aiGonder(komutlar[type]);
}

function konus(){
  const SpeechRecognition=window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    document.getElementById("output").innerText="Bu tarayıcı ses tanımayı desteklemiyor.";
    return;
  }

  const recognition=new SpeechRecognition();
  recognition.lang="tr-TR";
  recognition.start();

  document.getElementById("output").innerText="Dinliyorum...";

  recognition.onresult=function(event){
    const text=event.results[0][0].transcript;
    document.getElementById("userInput").value=text;
    aiGonder(text);
  };

  recognition.onerror=function(){
    document.getElementById("output").innerText="Ses alınamadı. Tekrar dene.";
  };
}
</script>

</body>
</html>
