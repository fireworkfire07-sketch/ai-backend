<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORHAN AI</title>
</head>
<body>
<h1>ORHAN AI</h1>

<input id="p" placeholder="Yaz..." style="width:100%;font-size:22px;padding:12px;">
<button onclick="go()" style="font-size:22px;padding:12px;margin-top:10px;">Gönder</button>

<pre id="r">Hazır...</pre>

<script>
async function go(){
  r.innerText="Düşünüyor...";
  let cevap = await fetch("/api/brain",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:p.value})
  });
  r.innerText = await cevap.text();
}
</script>
</body>
</html>
